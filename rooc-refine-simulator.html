<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROO Refine Simulator - Pseudo</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-color: #1a1c23;
            --accent-blue: #4a90e2;
            --primary-blue: #66fcf1;
            --text-color: #e0e0e0;
            --gold: #f3c623;
            --fail-red: #ff4d4d;
            --tab-bg: #0f1116;
            --card-bg: rgba(0, 0, 0, 0.45);
            --border: #333a45;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at center, #1b2029 0%, #0b0c10 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 95vw;
            max-width: 1300px;
            height: 88vh;
            background: var(--panel-color);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            border: 1px solid var(--border);
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Top Header: Session Stats */
        .top-header {
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 110;
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--accent-blue);
            margin-right: 15px;
        }

        .session-title {
            font-weight: 800;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--accent-blue);
            text-transform: uppercase;
        }

        .session-stats-header {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .stat-header-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.03);
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-header-item span { font-size: 7px; color: #888; text-transform: uppercase; }
        .stat-header-item div { font-weight: bold; color: var(--gold); font-size: 13px; font-family: 'Consolas', monospace; }

        .reset-all-btn {
            background: rgba(255, 77, 77, 0.1);
            color: var(--fail-red);
            border: 1px solid rgba(255, 77, 77, 0.3);
            padding: 6px 10px;
            border-radius: 15px;
            font-size: 9px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .reset-all-btn:hover {
            background: rgba(255, 77, 77, 0.2);
        }

        .main-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 340px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .sidebar-header {
            padding: 18px 20px;
            background: rgba(0,0,0,0.3);
            font-weight: bold;
            font-size: 0.85em;
            letter-spacing: 1px;
            color: #aaa;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-sidebar {
            display: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--fail-red);
        }

        .item-list {
            flex: 1;
            overflow-y: auto;
        }

        .item-list::-webkit-scrollbar { width: 4px; }
        .item-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .item-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: 0.2s;
        }

        .item-entry:hover { background: rgba(255,255,255,0.02); }
        .item-entry.active { background: linear-gradient(90deg, rgba(74, 144, 226, 0.15) 0%, transparent 100%); border-left: 4px solid var(--accent-blue); }

        .item-left-block { display: flex; align-items: center; }

        .item-icon-box {
            width: 44px;
            height: 44px;
            background: #000;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            position: relative;
            margin-right: 12px;
            border: 1px solid #333;
        }

        .badge {
            position: absolute;
            bottom: -6px;
            left: -6px;
            background: var(--gold);
            color: #000;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 5px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .item-info .name { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 3px; }
        .item-info .type { font-size: 10px; color: #666; }

        /* Manual Level Controls */
        .manual-controls {
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.3);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ctrl-btn {
            background: #2a313d;
            border: none;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
        }

        .ctrl-btn:hover { background: var(--accent-blue); }
        .ctrl-btn:active { transform: scale(0.9); }

        /* Main Forge Area */
        .main-forge {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        canvas {
            flex: 0 0 60%;
            width: 100%;
        }

        /* Interface Card */
        .refine-card {
            flex: 0 0 40%;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 15px 10px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            backdrop-filter: blur(15px);
            width: 100%;
        }

        .mode-tabs {
            display: flex;
            background: var(--tab-bg);
            border-radius: 30px;
            padding: 4px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: #555;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 25px;
            user-select: none;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
        }

        .tab-btn.disabled {
            opacity: 0.15;
            cursor: not-allowed;
        }

        .cost-row {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }

        .cost-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 100px;
        }

        .cost-box {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at center, #1b1e26 0%, #000 100%);
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 1px solid #444;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .cost-amount { font-size: 13px; color: #fff; font-weight: bold; }
        .cost-name { font-size: 8px; color: #777; text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; text-align: center; }

        .action-container {
            text-align: center;
            width: 100%;
        }

        .refine-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 16px 0;
            width: 100%;
            max-width: 420px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .refine-btn:hover:not(:disabled) { 
            background: #5ba4ff;
            transform: translateY(-2px);
        }
        .refine-btn:active { transform: translateY(0); }
        .refine-btn:disabled { background: #2a313d; color: #555; cursor: not-allowed; box-shadow: none; }

        .chance-info {
            margin-bottom: 12px;
            font-size: 12px;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .chance-info b { color: var(--primary-blue); font-size: 1.1em; }
        
        .lucky-bonus { 
            display: none; /* Hidden when no value */
            color: var(--gold); 
            font-size: 9px; 
            font-weight: bold; 
            background: rgba(243, 198, 35, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid rgba(243, 198, 35, 0.2);
            margin-left: 10px;
        }

        #log-container {
            position: absolute;
            top: 25px;
            right: 30px;
            text-align: right;
            pointer-events: none;
            z-index: 5;
        }

        .trademark-footer {
            margin-top: 10px;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.15);
            font-weight: bold;
            pointer-events: none;
            user-select: none;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container { height: 95vh; width: 98vw; border-radius: 0; }
            .menu-toggle { display: block; }
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                background: #0d1117;
                transform: translateX(-100%);
                box-shadow: 10px 0 30px rgba(0,0,0,0.8);
                width: 280px;
            }
            .sidebar.active { transform: translateX(0); }
            .close-sidebar { display: block; }
            .session-stats-header { gap: 8px; }
            .stat-header-item { padding: 4px 8px; }
            .stat-header-item div { font-size: 12px; }
            .stat-header-item span { font-size: 6px; }
            .session-title { display: none; }
            .reset-all-btn { padding: 4px 8px; font-size: 8px; }
            
            canvas { flex: 0 0 55%; }
            .refine-card { flex: 0 0 45%; }
            
            .cost-box { width: 45px; height: 45px; font-size: 20px; }
            .refine-btn { width: 90%; }
            .mode-tabs { width: 90%; }
        }

        .overlay-mask {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 95;
            backdrop-filter: blur(2px);
        }
        .overlay-mask.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="top-header">
        <div style="display: flex; align-items: center;">
            <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
            <div class="session-title">Total Accumulated Cost</div>
        </div>
        <div class="session-stats-header">
            <div class="stat-header-item">
                <span>Ore</span>
                <div id="countOri">0</div>
            </div>
            <div class="stat-header-item">
                <span>Enriched</span>
                <div id="countEnriched">0</div>
            </div>
            <div class="stat-header-item">
                <span>Blessed</span>
                <div id="countBlessed">0</div>
            </div>
            <div class="stat-header-item">
                <span>Zeny</span>
                <div id="countZeny">0</div>
            </div>
            <button class="reset-all-btn" onclick="resetCosts()">Reset Costs</button>
        </div>
    </div>

    <div class="main-body">
        <div class="overlay-mask" id="sidebarMask" onclick="toggleSidebar()"></div>
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                EQUIPMENT SLOTS
                <div class="close-sidebar" onclick="toggleSidebar()">✕</div>
            </div>
            <div class="item-list" id="itemList"></div>
        </div>

        <!-- Main Forge -->
        <div class="main-forge" id="forgeContainer">
            <div id="log-container">
                <div id="logMsg" style="font-size: 18px; color: var(--gold); font-weight: bold; text-shadow: 0 4px 8px rgba(0,0,0,0.8);"></div>
            </div>
            
            <canvas id="forgeCanvas"></canvas>

            <!-- Bottom Interface Card -->
            <div class="refine-card">
                <!-- Mode Selection -->
                <div class="mode-tabs">
                    <div class="tab-btn active" id="tabNormal" onclick="setMode('Normal')">Normal Refine</div>
                    <div class="tab-btn" id="tabBlessed" onclick="setMode('Blessed')">Blessed Refine</div>
                </div>

                <!-- Costs -->
                <div class="cost-row">
                    <div class="cost-item">
                        <div class="cost-box" id="oreIcon">💎</div>
                        <div class="cost-amount" id="costOre">0</div>
                        <div class="cost-name" id="oreName">Oridecon</div>
                    </div>
                    <div class="cost-item" id="blessedItem" style="opacity: 0.2;">
                        <div class="cost-box">✨</div>
                        <div class="cost-amount" id="costBlessed">0</div>
                        <div class="cost-name">Blessed Ore</div>
                    </div>
                    <div class="cost-item">
                        <div class="cost-box">🪙</div>
                        <div class="cost-amount" id="costZeny">0</div>
                        <div class="cost-name">Eden Coin</div>
                    </div>
                </div>

                <!-- Action Area -->
                <div class="action-container">
                    <div class="chance-info">
                        Success Rate: <b id="successRate">100%</b>
                        <span id="luckyLabel" class="lucky-bonus"></span>
                    </div>
                    <button class="refine-btn" id="refineBtn" onclick="handleRefine()">Refine Gear</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="trademark-footer">
    Built by Pseudo.
</footer>

<script>
    const canvas = document.getElementById('forgeCanvas');
    const ctx = canvas.getContext('2d');
    
    const refineSheet = [
        { rate: 100, ore: 2, enriched: 0, blessed: 0, zeny: 400 },
        { rate: 100, ore: 3, enriched: 0, blessed: 0, zeny: 600 },
        { rate: 100, ore: 4, enriched: 0, blessed: 0, zeny: 8000 },
        { rate: 55,  ore: 4, enriched: 0, blessed: 0, zeny: 8000 },
        { rate: 50,  ore: 4, enriched: 0, blessed: 1, zeny: 8000 },
        { rate: 45,  ore: 6, enriched: 0, blessed: 2, zeny: 12000 },
        { rate: 40,  ore: 12, enriched: 0, blessed: 0, zeny: 24000 },
        { rate: 30,  ore: 20, enriched: 0, blessed: 3, zeny: 40000 },
        { rate: 25,  ore: 30, enriched: 0, blessed: 3, zeny: 60000 },
        { rate: 10,  ore: 40, enriched: 0, blessed: 0, zeny: 80000 },
        { rate: 20,  ore: 0, enriched: 12, blessed: 5, zeny: 120000 },
        { rate: 18,  ore: 0, enriched: 16, blessed: 5, zeny: 160000 },
        { rate: 16,  ore: 0, enriched: 20, blessed: 0, zeny: 200000 },
        { rate: 14,  ore: 0, enriched: 24, blessed: 10, zeny: 240000 },
        { rate: 12,  ore: 0, enriched: 28, blessed: 15, zeny: 280000 },
        { rate: 11,  ore: 0, enriched: 36, blessed: 0, zeny: 360000 },
        { rate: 10,  ore: 0, enriched: 42, blessed: 15, zeny: 420000 }
    ];

    const safeLevels = [3, 6, 9, 12, 15];
    const items = [
        { id: 1, name: "Main Weapon", type: "Weapon", icon: "⚔️", level: 0, lucky: 0 },
        { id: 2, name: "Offhand", type: "Offhand", icon: "🛡️", level: 0, lucky: 0 },
        { id: 3, name: "Armor", type: "Armor", icon: "🧥", level: 0, lucky: 0 },
        { id: 4, name: "Garment", type: "Garment", icon: "🧣", level: 0, lucky: 0 },
        { id: 5, name: "Shoes", type: "Shoes", icon: "👢", level: 0, lucky: 0 },
        { id: 6, name: "Accessory", type: "Accessory", icon: "💍", level: 0, lucky: 0 },
        { id: 7, name: "Accessory", type: "Accessory", icon: "📿", level: 0, lucky: 0 }
    ];

    let session = { ori: 0, enriched: 0, blessed: 0, zeny: 0 };
    let selectedItem = items[0];
    let mode = 'Normal'; 
    let animating = false;
    let shake = 0;
    let flash = 0;
    let popup = { active: false, text: "", color: "", o: 0 };
    let particles = [];

    function resize() {
        const container = document.getElementById('forgeContainer');
        if (!container) return;
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight * 0.6;
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mask = document.getElementById('sidebarMask');
        sidebar.classList.toggle('active');
        mask.classList.toggle('active');
    }

    window.addEventListener('resize', resize);
    setTimeout(resize, 100);

    function setMode(m) {
        if (animating) return;
        const data = refineSheet[selectedItem.level];
        if (m === 'Blessed' && (!data || data.blessed === 0)) return;
        mode = m;
        updateUI();
    }

    function selectItem(id) {
        if (animating) return;
        selectedItem = items.find(i => i.id === id);
        popup.active = false;
        const data = refineSheet[selectedItem.level];
        if (mode === 'Blessed' && (!data || data.blessed === 0)) mode = 'Normal';
        
        if (window.innerWidth <= 768) {
            toggleSidebar();
        }

        renderList();
        updateUI();
    }

    function changeLevelManual(id, delta) {
        if (animating) return;
        const item = items.find(i => i.id === id);
        const newLevel = Math.max(0, Math.min(refineSheet.length, item.level + delta));
        
        if (newLevel !== item.level) {
            item.level = newLevel;
            item.lucky = 0; 
            
            resetCosts();
            
            if (selectedItem.id === id) {
                const data = refineSheet[selectedItem.level];
                if (mode === 'Blessed' && (!data || data.blessed === 0)) mode = 'Normal';
            }
            
            renderList();
            updateUI();
        }
    }

    function resetCosts() {
        session.ori = 0;
        session.enriched = 0;
        session.blessed = 0;
        session.zeny = 0;
        updateUI();
    }

    function renderList() {
        const list = document.getElementById('itemList');
        list.innerHTML = items.map(item => `
            <div class="item-entry ${selectedItem.id === item.id ? 'active' : ''}" onclick="selectItem(${item.id})">
                <div class="item-left-block">
                    <div class="item-icon-box">
                        ${item.icon}
                        <div class="badge">+${item.level}</div>
                    </div>
                    <div class="item-info">
                        <div class="name">${item.name}</div>
                        <div class="type">${item.type}</div>
                    </div>
                </div>
                <div class="manual-controls" onclick="event.stopPropagation()">
                    <button class="ctrl-btn" onclick="changeLevelManual(${item.id}, -1)">-</button>
                    <button class="ctrl-btn" onclick="changeLevelManual(${item.id}, 1)">+</button>
                </div>
            </div>
        `).join('');
    }

    function updateUI() {
        const data = refineSheet[selectedItem.level] || refineSheet[refineSheet.length - 1];
        
        document.getElementById('tabNormal').classList.toggle('active', mode === 'Normal');
        document.getElementById('tabBlessed').classList.toggle('active', mode === 'Blessed');
        
        const blessedTab = document.getElementById('tabBlessed');
        if (!data || data.blessed === 0) blessedTab.classList.add('disabled');
        else blessedTab.classList.remove('disabled');

        const isWep = selectedItem.type === 'Weapon';
        const useEnriched = data.enriched > 0;
        document.getElementById('oreIcon').innerText = useEnriched ? "🔷" : (isWep ? "💎" : "💠");
        document.getElementById('oreName').innerText = useEnriched ? "Enriched" : (isWep ? "Ori" : "Elu");
        document.getElementById('costOre').innerText = useEnriched ? data.enriched : data.ore;
        document.getElementById('costZeny').innerText = data.zeny.toLocaleString();
        
        const bItem = document.getElementById('blessedItem');
        if (mode === 'Blessed' && data.blessed > 0) {
            bItem.style.opacity = '1';
            document.getElementById('costBlessed').innerText = data.blessed;
        } else {
            bItem.style.opacity = '0.2';
            document.getElementById('costBlessed').innerText = data.blessed || 0;
        }

        document.getElementById('successRate').innerText = data.rate + "%";
        
        // Hide Lucky Value if it is 0
        const luckyEl = document.getElementById('luckyLabel');
        if (selectedItem.lucky > 0) {
            luckyEl.innerText = `+${selectedItem.lucky}% Lucky`;
            luckyEl.style.display = 'inline-block';
        } else {
            luckyEl.style.display = 'none';
        }

        document.getElementById('countOri').innerText = session.ori.toLocaleString();
        document.getElementById('countEnriched').innerText = session.enriched.toLocaleString();
        document.getElementById('countBlessed').innerText = session.blessed.toLocaleString();
        document.getElementById('countZeny').innerText = session.zeny.toLocaleString();
    }

    function handleRefine() {
        if (animating) return;
        const data = refineSheet[selectedItem.level];
        if (!data) return;

        animating = true;
        document.getElementById('refineBtn').disabled = true;
        popup.active = false;

        if (data.enriched > 0) session.enriched += data.enriched;
        else session.ori += data.ore;
        if (mode === 'Blessed' && data.blessed > 0) session.blessed += data.blessed;
        session.zeny += data.zeny;
        updateUI();

        setTimeout(() => {
            const chance = data.rate + selectedItem.lucky;
            const roll = Math.random() * 100;
            const success = roll <= chance;

            if (success) {
                selectedItem.level++;
                selectedItem.lucky = 0;
                flash = 40;
                popup = { active: true, text: "SUCCESS!", color: "#f3c623", o: 1.5 };
                for(let i=0; i<50; i++) particles.push({
                    x: canvas.width/2, y: canvas.height/2-40,
                    vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18,
                    l: 1, c: "#f3c623"
                });
                const next = refineSheet[selectedItem.level];
                if (mode === 'Blessed' && (!next || next.blessed === 0)) mode = 'Normal';
            } else {
                shake = 30;
                popup = { active: true, text: "FAILED", color: "#e74c3c", o: 1.5 };
                if (mode === 'Normal') {
                    const isSafe = safeLevels.includes(selectedItem.level);
                    if (isSafe) {
                        // Milestone safety: No drop, no Lucky Value increase (per previous rule)
                    } else if (selectedItem.level > 0) {
                        // 50% chance to degrade, 50% to retain. Lucky Value increases in both cases.
                        if (Math.random() < 0.5) {
                            // Degrade
                            selectedItem.level--;
                            
                            // RULE: If decreased to safety milestone, reset Lucky Value to 0
                            if (safeLevels.includes(selectedItem.level)) {
                                selectedItem.lucky = 0;
                            } else {
                                selectedItem.lucky += 5;
                            }
                        } else {
                            // Retain
                            selectedItem.lucky += 1;
                        }
                    } else {
                        // Level 0 failure increases lucky value by 1
                        selectedItem.lucky += 1;
                    }
                }
            }

            animating = false;
            document.getElementById('refineBtn').disabled = false;
            renderList();
            updateUI();
        }, 1200);
    }

    function draw() {
        ctx.fillStyle = "#0d1016";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        if (shake > 0) {
            ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
            shake *= 0.85;
        }

        const cx = canvas.width / 2;
        const cy = canvas.height / 2; 

        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 250);
        g.addColorStop(0, animating ? 'rgba(74, 144, 226, 0.25)' : 'rgba(255,255,255,0.03)');
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.shadowBlur = animating ? 50 : 20;
        ctx.shadowColor = animating ? "#4a90e2" : "#000";
        ctx.fillStyle = "#000";
        ctx.beginPath();
        const size = Math.min(canvas.height * 0.7, 180);
        ctx.roundRect(cx - size/2, cy - size/2, size, size, 24);
        ctx.fill();
        ctx.strokeStyle = animating ? "#66fcf1" : "#2a313d";
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.font = (size * 0.55) + "px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(selectedItem.icon, cx, cy);
        ctx.shadowBlur = 0;

        ctx.font = "bold " + (size * 0.28) + "px Segoe UI";
        ctx.fillStyle = "#fff";
        ctx.fillText("+" + selectedItem.level, cx, cy + (size * 0.72));

        if (animating) {
            ctx.font = "bold 13px Segoe UI";
            ctx.fillStyle = "#66fcf1";
            const dots = ".".repeat(Math.floor(Date.now() / 200) % 4);
            ctx.fillText("UPGRADING" + dots, cx, cy + (size * 1.0));
        }

        if (popup.active && popup.o > 0) {
            ctx.font = "900 " + (size * 0.44) + "px Segoe UI";
            ctx.fillStyle = popup.color;
            ctx.globalAlpha = Math.min(1, popup.o);
            ctx.fillText(popup.text, cx, cy - (size * 1.0));
            popup.o -= 0.025;
            ctx.globalAlpha = 1;
        }

        particles = particles.filter(p => p.l > 0);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.l -= 0.02;
            ctx.fillStyle = p.c;
            ctx.globalAlpha = p.l;
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1;

        ctx.restore();

        if (flash > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${flash / 40})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            flash--;
        }

        requestAnimationFrame(draw);
    }

    renderList();
    updateUI();
    draw();
</script>

</body>
</html>
